<!DOCTYPE html>
<html>
<head>
  <title>App Layout</title>
</head>

<body style="margin:0; font-family:Arial; display:flex; height:100vh;">

  <!-- Sidebar -->
  <div style="width:220px; background:#1e293b; color:white; padding:20px;">
    <h3>Menu</h3>

    <p onclick="showSection('payment')" style="cursor:pointer;">Record Payment</p>
    <p onclick="showSection('report')" style="cursor:pointer;">Report</p>
    <p onclick="showSection('invoice')" style="cursor:pointer;">Generate Invoice</p>
    <p onclick="showSection('employeeReport')" style="cursor:pointer;">Employee Report</p>
  </div>

  <!-- Main Content -->
  <div style="flex:1; padding:30px; background:#f1f5f9; color:#0f172a;">

    <div id="payment">
      <!-- You will add content -->
    </div>

    <div id="report" style="display:none;">
      <!-- You will add content -->
    </div>

    <div id="invoice" style="display:none;">
      <!-- You will add content -->
    </div>

    <div id="employeeReport" style="display:none;">
      <!-- You will add content -->
    </div>

  </div>

  <script>
    function showSection(section) {
      document.getElementById("payment").style.display = "none";
      document.getElementById("report").style.display = "none";
      document.getElementById("invoice").style.display = "none";
      document.getElementById("employeeReport").style.display = "none";

      document.getElementById(section).style.display = "block";
    }
  </script>

</body>
</html>
